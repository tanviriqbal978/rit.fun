<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rit.fun - Token Launchpad</title>
    <script>
      // Defensive guard for fetch to prevent 'read-only' property errors
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: () => originalFetch,
          set: () => { console.warn('Attempted to overwrite window.fetch ignored'); },
          configurable: false
        });
      } catch (e) {
        console.warn('Fetch lock failed', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
